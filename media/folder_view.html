<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'none'; script-src {{cspSource}} 'unsafe-inline'; style-src {{cspSource}} 'unsafe-inline'; connect-src {{cspSource}};" />
	<style>
		:root {
			--tab-height: 35px;
		}

		#tab-description {
			padding: 6px 16px;
			font-size: 12px;
			color: var(--vscode-descriptionForeground);
			border-bottom: 1px solid var(--vscode-panel-border);
			display: flex;
			align-items: center;
			gap: 12px;
			flex-wrap: wrap;
			min-height: 28px;
		}

		body {
			margin: 0;
			padding: 0;
			font-family: var(--vscode-font-family);
			color: var(--vscode-foreground);
			background-color: var(--vscode-editor-background);
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.tab-header {
			display: flex;
			background: var(--vscode-editorGroupHeader-tabsBackground);
			height: var(--tab-height);
			border-bottom: 1px solid var(--vscode-panel-border);
		}

		.tab-btn {
			padding: 0 20px;
			border: none;
			background: none;
			color: var(--vscode-tab-inactiveForeground);
			cursor: pointer;
			height: 100%;
		}

		.tab-btn.active {
			background: var(--vscode-tab-activeBackground);
			color: var(--vscode-tab-activeForeground);
			border-bottom: 2px solid var(--vscode-panelTitle-activeBorder);
		}

		.tab-content {
			flex: 1;
			overflow-y: auto;
			/* PERMET LE SCROLL VERTICAL */
			overflow-x: hidden;
		}

		.tab-pane {
			width: 100%;
		}

		#mainCanvas {
			display: block;
			margin: 0 auto;
		}

		#context-menu {
			position: fixed;
			background: #252526;
			color: #cccccc;
			border: 1px solid #454545;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
			padding: 4px 0;
			z-index: 1000;
			display: none;
			font-family: var(--vscode-font-family, sans-serif);
			font-size: 12px;
			min-width: 150px;
		}

		.menu-item {
			padding: 6px 12px;
			cursor: pointer;
		}

		.menu-item:hover {
			background: #094771;
			color: white;
		}

		#loadingOverlay {
			color: var(--vscode-descriptionForeground);
			font-size: 1.2em;
		}

		.spinner {
			border: 3px solid var(--vscode-panel-border);
			border-top: 3px solid var(--vscode-button-background);
			border-radius: 50%;
			width: 20px;
			height: 20px;
			animation: spin 1s linear infinite;
			margin: 0 auto 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<nav class="tab-header">
		<button class="tab-btn active" data-target="Files">Slow Files</button>
		<button class="tab-btn" data-target="Includes">Heavy Headers</button>
		<button class="tab-btn" data-target="IncludesCumulatedTime">Header Impact</button>
	</nav>
	<div id="tab-description">
		<span id="desc-text"></span>
	</div>
	<div id="canvasContainer" style="overflow-y: auto; height: 100vh; position: relative;">
		<div id="loadingOverlay"
			style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
			<div class="spinner"></div>
			<p>Loading trace data...</p>
		</div>
		<div id="virtualHeight" style="position: absolute; top: 0; left: 0; width: 1px;"></div>
		<canvas id="mainCanvas" style="position: sticky; top: 0; left: 0; display: block;"></canvas>
	</div>

	<div id="context-menu">
		<div class="menu-item" id="menu-open-file">Open file</div>
		<div class="menu-item" id="menu-copy-path">Copy path</div>
	</div>
	<script src="{{scriptUri}}"></script>
</body>

</html>
