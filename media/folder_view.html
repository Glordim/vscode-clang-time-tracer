<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src {{cspSource}} 'unsafe-inline'; style-src {{cspSource}} 'unsafe-inline'; connect-src {{cspSource}};"/>
	<style>
		:root {
			--tab-height: 35px;
		}

		body {
			margin: 0;
			padding: 0;
			font-family: var(--vscode-font-family);
			color: var(--vscode-foreground);
			background-color: var(--vscode-editor-background);
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.tab-header {
			display: flex;
			background: var(--vscode-editorGroupHeader-tabsBackground);
			height: var(--tab-height);
			border-bottom: 1px solid var(--vscode-panel-border);
		}

		.tab-btn {
			padding: 0 20px;
			border: none;
			background: none;
			color: var(--vscode-tab-inactiveForeground);
			cursor: pointer;
			height: 100%;
		}

		.tab-btn.active {
			background: var(--vscode-tab-activeBackground);
			color: var(--vscode-tab-activeForeground);
			border-bottom: 2px solid var(--vscode-panelTitle-activeBorder);
		}

		.tab-content {
			flex: 1;
			overflow-y: auto;
			/* PERMET LE SCROLL VERTICAL */
			overflow-x: hidden;
		}

		.tab-pane {
			width: 100%;
		}

		#mainCanvas {
			display: block;
			margin: 0 auto;
		}
	</style>
</head>

<body>
	<nav class="tab-header">
		<button class="tab-btn active" data-target="Files">Files</button>
		<button class="tab-btn" data-target="Includes">Includes</button>
		<button class="tab-btn" data-target="IncludesCumulatedTime">Includes (Cumulated time)</button>
	</nav>
	<div id="canvasContainer" style="overflow-y: auto; height: 100vh; position: relative;">
		<div id="virtualHeight" style="position: absolute; top: 0; left: 0; width: 1px;"></div>
		<canvas id="mainCanvas" style="position: sticky; top: 0; left: 0; display: block;"></canvas>
	</div>

	<script>
		window.traceData = {{traceData}};
	</script>
	<script src="{{scriptUri}}"></script>
</body>

</html>
